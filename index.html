    ];

    const STORAGE_KEY = "hcd-roadmap-progress";

    // ─── Components ───────────────────────────────────────────────────

    function ProgressRing({ percent, size = 48, stroke = 4, color = "#2563eb" }) {
      const r = (size - stroke) / 2;
      const circ = 2 * Math.PI * r;
      const offset = circ - (percent / 100) * circ;
      return (
        <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#e5e7eb" strokeWidth={stroke} />
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
            strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
            style={{ transition: "stroke-dashoffset 0.5s ease" }} />
        </svg>
      );
    }

    function Badge({ children, variant = "gray" }) {
      const classes = { blue: 'badge-blue', purple: 'badge-purple', green: 'badge-green', gray: 'badge-gray', amber: 'badge-amber', red: 'badge-red', };
      return <span className={`badge ${classes[variant] || 'badge-gray'}`}>{children}</span>;
    }

    function Chevron({ open }) {
      return (
        <svg className={`chevron${open ? " chevron-open" : ""}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" />
        </svg>
      );
    }

    function ExternalIcon() {
      return (
        <svg style={{width:20,height:20,color:"#d1d5db",flexShrink:0}} fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
        </svg>
      );
    }

    // ─── Main App ───────────────────────────────────────────────

    function App() {
      const [activeTrack, setActiveTrack] = useState("basic");
      const [completed, setCompleted] = useState(() => {
        try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : {}; } catch { return {}; }
      });
      const [expandedModule, setExpandedModule] = useState(null);
      const [view, setView] = useState("roadmap");
      const [expandedPhase, setExpandedPhase] = useState(null);
      const [filterTag, setFilterTag] = useState(null);

      useEffect(() => {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(completed)); } catch {}
      }, [completed]);

      const modules = activeTrack === "basic" ? BASIC_MODULES : EXPERT_MODULES;
      const track = TRACKS[activeTrack];

      const toggleTopic = useCallback((moduleId, topicIdx) => {
        setCompleted(prev => {
          const key = `${moduleId}-${topicIdx}`;
          const next = { ...prev };
          if (next[key]) delete next[key]; else next[key] = true;
          return next;
        });
      }, []);

      const moduleProgress = useCallback(mod => {
        const total = mod.topics.length;
        const done = mod.topics.filter((_,i) => completed[`${mod.id}-${i}`]).length;
        return { total, done, pct: total ? Math.round(done/total*100) : 0 };
      }, [completed]);

      const overallProgress = useMemo(() => {
        const total = modules.reduce((s,m) => s + m.topics.length, 0);
        const done = modules.reduce((s,m) => s + m.topics.filter((_,i) => completed[`${m.id}-${i}`]).length, 0);
        return { total, done, pct: total ? Math.round(done/total*100) : 0 };
      }, [modules, completed]);

      const totalHours = useMemo(() => modules.reduce((s,m) => s + m.estimatedHours, 0), [modules]);
      const completedHours = useMemo(() =>
        modules.reduce((s,m) => { const p = moduleProgress(m); return s + (p.total ? p.done/p.total*m.estimatedHours : 0); }, 0),
      [modules, moduleProgress]);

      const resetProgress = () => {
        const prefix = activeTrack === "basic" ? "b" : "e";
        setCompleted(prev => {
          const next = {};
          for (const [k,v] of Object.entries(prev)) { if (!k.startsWith(prefix)) next[k] = v; }
          return next;
        });
      };

      const categories = useMemo(() => {
        const cats = []; let last = "";
        modules.forEach(m => { if (m.category !== last) { cats.push(m.category); last = m.category; } });
        return cats;
      }, [modules]);

      const basicTimeline = [
        {week:"Week 1-2",label:"理念とマインドセット",modules:["b1","b2"],color:"#2563eb"},
        {week:"Week 3-4",label:"HCDプロセスの計画",modules:["b3"],color:"#2563eb"},
        {week:"Week 5-6",label:"ユーザビリティ & アクセシビリティ",modules:["b4","b5"],color:"#3b82f6"},
        {week:"Week 7-8",label:"人間の特性 & 情報デザイン",modules:["b6","b7"],color:"#3b82f6"},
        {week:"Week 9",label:"UXライティング",modules:["b8"],color:"#60a5fa"},
        {week:"Week 10",label:"調査・分析手法",modules:["b9"],color:"#60a5fa"},
        {week:"Week 11",label:"評価手法 & 応用領域",modules:["b10","b11"],color:"#93c5fd"},
        {week:"Week 12",label:"総復習 & 模擬テスト",modules:[],color:"#16a34a"},
      ];
      const expertTimeline = [
        {month:"Month 1",label:"コンピタンスマップ理解 & 事例選定",modules:["e1"],color:"#7c3aed"},
        {month:"Month 2",label:"調査系コンピタンスの整理",modules:["e2","e3"],color:"#7c3aed"},
        {month:"Month 3",label:"設計・具現化の事例記述",modules:["e4"],color:"#8b5cf6"},
        {month:"Month 4",label:"評価・検証の事例記述",modules:["e5"],color:"#8b5cf6"},
        {month:"Month 5",label:"マネジメント & 組織推進",modules:["e6","e7"],color:"#a78bfa"},
        {month:"Month 6",label:"記述書の推敲 & 提出準備",modules:["e8"],color:"#16a34a"},
      ];

      const filteredMethods = useMemo(() => {
        if (!filterTag) return UX_METHODS;
        return UX_METHODS.filter(m => m.tags.includes(filterTag));
      }, [filterTag]);

      const methodsByCategory = useMemo(() => {
        const grouped = {
          '1. リサーチ・調査': [],
          '2. モデリング・構造化': [],
          '3. アイデア発想・共創': [],
          '4. プロトタイピング': [],
          '5. テスト・評価': [],
          '6. デザインシステム・ビジュアル': [],
          '7. UX戦略・計測': [],
          '8. サービスデザイン固有': [],
        };
        filteredMethods.forEach(m => {
          if (m.num <= 14) grouped['1. リサーチ・調査'].push(m);
          else if (m.num <= 25) grouped['2. モデリング・構造化'].push(m);
          else if (m.num <= 35) grouped['3. アイデア発想・共創'].push(m);
          else if (m.num <= 43) grouped['4. プロトタイピング'].push(m);
          else if (m.num <= 53) grouped['5. テスト・評価'].push(m);
          else if (m.num <= 59) grouped['6. デザインシステム・ビジュアル'].push(m);
          else if (m.num <= 64) grouped['7. UX戦略・計測'].push(m);
          else grouped['8. サービスデザイン固有'].push(m);
        });
        return grouped;
      }, [filteredMethods]);

      const getTagClass = (tag) => {
        if (tag === 'HCD') return 'tag-hcd';
        if (tag === 'デザイン思考') return 'tag-dt';
        if (tag === 'リーンUX') return 'tag-lean';
        if (tag === 'アジャイル') return 'tag-agile';
        if (tag === 'サービスデザイン') return 'tag-service';
        if (tag === 'TEM' || tag === 'TEM / 体験マッピング') return 'tag-tem';
        if (tag.includes('Discovery') || tag.includes('Define') || tag.includes('Ideate') || tag.includes('Design') || tag.includes('Test') || tag.includes('Handoff')) return 'tag-phase';
        if (tag.includes('日') || tag.includes('時間') || tag.includes('週') || tag.includes('月')) return 'tag-time';
        if (tag === '低' || tag === '中' || tag === '高') return 'tag-difficulty';
        return 'tag-output';
      };

      const phasePercent = (phaseModuleIds) => {
        const pm = modules.filter(m => phaseModuleIds.includes(m.id));
        const t = pm.reduce((s,m) => s + m.topics.length, 0);
        const d = pm.reduce((s,m) => s + m.topics.filter((_,j) => completed[`${m.id}-${j}`]).length, 0);
        return t ? Math.round(d/t*100) : 0;
      };

      return (
        <div style={{minHeight:"100vh"}} className="bg-gray-50">
          {/* Header */}
          <header className="sticky-header">
            <div className="max-w" style={{padding:"12px 16px"}}>
              <div className="flex items-center justify-between flex-wrap gap-2">
                <div className="flex items-center gap-3">
                  <div className="icon-box" style={{background:track.color}}>HCD</div>
                  <div>
                    <h1 className="text-lg font-bold text-gray-900">HCD資格 学習ロードマップ</h1>
                    <p className="text-xs text-gray-500">UI/UXデザイナー・UX実務者のための学習支援ツール</p>
                  </div>
                </div>
                <div className="flex items-center gap-2">
                  <ProgressRing percent={overallProgress.pct} size={44} color={track.color} />
                  <div className="text-xs text-gray-500 leading-tight">
                    {overallProgress.done}/{overallProgress.total} 項目<br/>約{Math.round(completedHours)}h / {totalHours}h
                  </div>
                </div>
              </div>
            </div>
          </header>

          <div className="max-w py-4">
            {/* Track Switcher */}
            <div className="flex gap-2 mb-4">
              {Object.values(TRACKS).map(t => (
                <button key={t.id} onClick={() => { setActiveTrack(t.id); setExpandedModule(null); }}
                  className="flex-1 rounded-xl p-3 text-left border-2 transition"
                  style={activeTrack === t.id
                    ? {borderColor:t.color, background:`${t.color}08`}
                    : {borderColor:"#e5e7eb", background:"#fff"}}>
                  <div className="font-bold text-sm" style={{color: activeTrack===t.id ? t.color : "#374151"}}>{t.label}</div>
                  <div className="text-xs text-gray-500 mt-05">{t.subtitle}</div>
                </button>
              ))}
            </div>

            {/* Description */}
            <div className="card p-4 mb-4">
              <p className="text-sm text-gray-600">{track.description}</p>
              <div className="flex gap-4 mt-3">
                <div className="text-center">
                  <div className="text-2xl font-bold" style={{color:track.color}}>{modules.length}</div>
                  <div className="text-xs text-gray-500">学習モジュール</div>
                </div>
                <div className="text-center">
                  <div className="text-2xl font-bold" style={{color:track.color}}>{totalHours}h</div>
                  <div className="text-xs text-gray-500">想定学習時間</div>
                </div>
                <div className="text-center">
                  <div className="text-2xl font-bold" style={{color:track.color}}>
                    {modules.reduce((s,m) => s + m.topics.length, 0)}
                  </div>
                  <div className="text-xs text-gray-500">学習項目</div>
                </div>
              </div>
            </div>

            {/* View Tabs */}
            <div className="flex gap-1 mb-4 rounded-lg p-1 bg-gray-100">
              {[{id:"roadmap",label:"ロードマップ"},{id:"resources",label:"参考リソース"},{id:"timeline",label:"学習計画"},{id:"ux-guide",label:"UX実践ガイド"}].map(v => (
                <button key={v.id} onClick={() => setView(v.id)}
                  className={`btn-tab ${view===v.id ? "btn-tab-active" : "btn-tab-inactive"}`}>
                  {v.label}
                </button>
              ))}
            </div>

            {/* ── UX Practice Guide ── */}
            {view === "ux-guide" && (
              <div>
                {/* Phase Timeline */}
                <div className="mb-6">
                  <h2 className="text-sm font-bold text-gray-600 uppercase tracking-wider mb-4">UXプロセスフロー</h2>
                  <div className="phase-timeline mb-4">
                    {UX_PHASES.map(phase => (
                      <button key={phase.id}
                        className="phase-block"
                        style={{background: phase.color}}
                        onClick={() => setExpandedPhase(expandedPhase === phase.id ? null : phase.id)}>
                        <div className="phase-block-title">{phase.num}. {phase.name}</div>
                        <div className="phase-block-time">{phase.time}</div>
                      </button>
                    ))}
                  </div>

                  {/* Phase Details */}
                  {expandedPhase && (
                    <div className="phase-detail">
                      {UX_PHASES.map(phase =>
                        expandedPhase === phase.id ? (
                          <div key={phase.id}>
                            <h3 style={{color: phase.color, marginBottom: 16}}>PHASE {phase.num}: {phase.label}</h3>

                            <div style={{marginBottom: 16}}>
                              <h4 className="text-xs font-semibold text-gray-600 uppercase mb-2">やること</h4>
                              <div className="phase-detail-steps">
                                {phase.steps.map((step, i) => (
                                  <div key={i} className="phase-step">
                                    <strong>{step}</strong>
                                  </div>
                                ))}
                              </div>
                            </div>

                            <div style={{marginBottom: 16}}>
                              <h4 className="text-xs font-semibold text-gray-600 uppercase mb-2">成果物</h4>
                              <div className="flex gap-2 flex-wrap">
                                {phase.outputs.map((output, i) => (
                                  <Badge key={i} variant="blue">{output}</Badge>
                                ))}
                              </div>
                            </div>

                            <div>
                              <h4 className="text-xs font-semibold text-gray-600 uppercase mb-2">💡 Tips</h4>
                              <p className="text-sm text-gray-600">{phase.tips}</p>
                            </div>
                          </div>
                        ) : null
                      )}
                    </div>
                  )}
                </div>

                {/* Filter Buttons */}
                <div>
                  <h2 className="text-sm font-bold text-gray-600 uppercase tracking-wider mb-3">UX手法カタログ ({filteredMethods.length}手法)</h2>
                  <div className="filter-buttons">
                    <button className={`filter-btn ${!filterTag ? 'active' : ''}`} onClick={() => setFilterTag(null)}>
                      全て ({UX_METHODS.length})
                    </button>
                    <button className={`filter-btn ${filterTag === 'HCD' ? 'active' : ''}`} onClick={() => setFilterTag('HCD')}>
                      HCD
                    </button>
                    <button className={`filter-btn ${filterTag === 'デザイン思考' ? 'active' : ''}`} onClick={() => setFilterTag('デザイン思考')}>
                      デザイン思考
                    </button>
                    <button className={`filter-btn ${filterTag === 'リーンUX' ? 'active' : ''}`} onClick={() => setFilterTag('リーンUX')}>
                      リーンUX
                    </button>
                    <button className={`filter-btn ${filterTag === 'アジャイル' ? 'active' : ''}`} onClick={() => setFilterTag('アジャイル')}>
                      アジャイル
                    </button>
                    <button className={`filter-btn ${filterTag === 'サービスデザイン' ? 'active' : ''}`} onClick={() => setFilterTag('サービスデザイン')}>
                      サービスデザイン
                    </button>
                    <button className={`filter-btn ${filterTag === 'TEM' ? 'active' : ''}`} onClick={() => setFilterTag('TEM')}>
                      TEM
                    </button>
                  </div>
                </div>

                {/* Method Categories */}
                <div className="method-categories mt-6">
                  {Object.entries(methodsByCategory).map(([category, methods]) =>
                    methods.length > 0 ? (
                      <div key={category} className="category-section">
                        <div className="category-header">
                          <span className="category-icon">
                            {category.startsWith('1') ? '🔍' : category.startsWith('2') ? '🗂️' : category.startsWith('3') ? '💡' :
                             category.startsWith('4') ? '🛠️' : category.startsWith('5') ? '✓' : category.startsWith('6') ? '🎨' :
                             category.startsWith('7') ? '📊' : '🔗'}
                          </span>
                          <span>{category}</span>
                          <span className="category-count">{methods.length}手法</span>
                        </div>
                        <div>
                          {methods.map(method => (
                            <div key={method.num} className="method-card">
                              <div className="method-header">
                                <div className="method-num-badge" style={{
                                  background: method.num <= 14 ? '#6366f1' : method.num <= 25 ? '#8b5cf6' :
                                             method.num <= 35 ? '#3b82f6' : method.num <= 43 ? '#0ea5e9' :
                                             method.num <= 53 ? '#22c55e' : method.num <= 59 ? '#f59e0b' :
                                             method.num <= 64 ? '#8b5cf6' : '#ec4899'
                                }}>
                                  {method.num}
                                </div>
                                <div className="method-body">
                                  <div className="method-name">
                                    {method.name_jp}
                                    <span className="method-name-en">{method.name_en}</span>
                                  </div>
                                  <div className="method-desc">{method.desc}</div>
                                  <div className="method-tags">
                                    {method.tags.map((tag, i) => (
                                      <span key={i} className={`tag ${getTagClass(tag)}`}>{tag}</span>
                                    ))}
                                  </div>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    ) : null
                  )}
                </div>
              </div>
            )}

            {/* ── Roadmap ── */}
            {view === "roadmap" && (
              <div>
                {categories.map(cat => (
                  <div key={cat} className="mb-6">
                    <h2 className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3 flex items-center gap-2">
                      <span className="dot" style={{background:track.color}} />
                      {cat}
                    </h2>
                    <div className="space-y-2">
                      {modules.filter(m => m.category === cat).map(mod => {
                        const prog = moduleProgress(mod);
                        const isOpen = expandedModule === mod.id;
                        return (
                          <div key={mod.id} className="card">
                            <button className="card-header" onClick={() => setExpandedModule(isOpen ? null : mod.id)}>
                              <span style={{fontSize:24}}>{mod.icon}</span>
                              <div className="flex-1 min-w-0">
                                <div className="font-semibold text-sm text-gray-900 truncate">{mod.title}</div>
                                <div className="flex items-center gap-2 mt-1">
                                  <Badge variant={prog.pct===100?"green":prog.pct>0?"amber":"gray"}>{prog.done}/{prog.total}</Badge>
                                  <span className="text-xs text-gray-400">約{mod.estimatedHours}時間</span>
                                </div>
                              </div>
                              <ProgressRing percent={prog.pct} size={40} stroke={3} color={prog.pct===100?"#16a34a":track.color} />
                              <Chevron open={isOpen} />
                            </button>
                            {isOpen && (
                              <div style={{borderTop:"1px solid #f3f4f6",padding:"0 16px 16px"}}>
                                {mod.topics.map((topic,i) => {
                                  const key = `${mod.id}-${i}`;
                                  const isDone = !!completed[key];
                                  return (
                                    <label key={i} className="flex items-start gap-3 py-3 border-b-light"
                                      style={{cursor:"pointer",opacity:isDone?0.6:1}}>
                                      <input type="checkbox" checked={isDone} onChange={() => toggleTopic(mod.id,i)}
                                        style={{accentColor:track.color}} />
                                      <div className="flex-1">
                                        <div className={`text-sm font-medium ${isDone?"line-through text-gray-400":"text-gray-800"}`}>{topic.name}</div>
                                        <div className="text-xs text-gray-500 mt-05">{topic.desc}</div>
                                      </div>
                                    </label>
                                  );
                                })}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))}
                <div className="mt-4 text-center">
                  <button onClick={resetProgress} className="text-xs text-gray-400 underline transition"
                    style={{cursor:"pointer"}}
                    onMouseEnter={e => e.target.style.color="#ef4444"}
                    onMouseLeave={e => e.target.style.color="#9ca3af"}>
                    このトラックの進捗をリセット
                  </button>
                </div>
              </div>
            )}

            {/* ── Resources ── */}
            {view === "resources" && (
              <div className="space-y-3">
                <h2 className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">推奨リソース — {track.label}</h2>
                {RESOURCES[activeTrack].map((res,i) => (
                  <a key={i} href={res.url} target="_blank" rel="noopener noreferrer" className="link-card">
                    <div className="flex items-center justify-between">
                      <div>
                        <div className="font-semibold text-sm text-gray-900">{res.name}</div>
                        <Badge variant={res.type==="公式"?"blue":res.type==="推薦図書"?"purple":"gray"}>{res.type}</Badge>
                      </div>
                      <ExternalIcon />
                    </div>
                  </a>
                ))}
                <div className="card p-4 mt-6">
                  <h3 className="font-bold text-sm text-gray-900 mb-2">
                    {activeTrack==="basic" ? "試験概要" : "審査概要"}
                  </h3>
                  {activeTrack === "basic" ? (
                    <div className="text-sm text-gray-600 space-y-1">
                      <p>形式: CBT（50問 / 50分）</p>
                      <p>実施: 年3回（2月・6月・10月予定）</p>
                      <p>主催: 一般社団法人 人間中心社会共創機構</p>
                      <p>範囲: HCD基礎知識体系報告書に準拠</p>
                    </div>
                  ) : (
                    <div className="text-sm text-gray-600 space-y-1">
                      <p>形式: 書類審査（コンピタンス記述書）</p>
                      <p>実施: 年1回（秋頃募集）</p>
                      <p>主催: NPO法人 人間中心設計推進機構（HCD-Net）</p>
                      <p>要件: 実践事例3件以上、各6コンピタンス以上を記述</p>
                      <p>スペシャリスト: 実務2年〜 / 専門家: 実務5年〜</p>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* ── Timeline ── */}
            {view === "timeline" && (
              <div>
                <div className="card p-4 mb-4">
                  <h3 className="font-bold text-sm text-gray-900 mb-3">
                    {activeTrack==="basic" ? "推奨学習スケジュール（12週間プラン）" : "推奨準備スケジュール（6ヶ月プラン）"}
                  </h3>
                  <div className="space-y-3">
                    {(activeTrack === "basic" ? basicTimeline : expertTimeline).map((phase,i) => {
                      const pct = phasePercent(phase.modules);
                      return (
                        <div key={i} className="flex items-center gap-3">
                          <div style={{width:80}} className="text-xs font-bold text-gray-500 shrink-0">{phase.week || phase.month}</div>
                          <div className="flex-1">
                            <div className="flex items-center justify-between mb-1">
                              <span className="text-sm font-medium text-gray-800">{phase.label}</span>
                              {phase.modules.length > 0 && <span className="text-xs text-gray-400">{pct}%</span>}
                            </div>
                            <div className="prog-bar">
                              <div className="prog-fill" style={{width:`${pct}%`,background:phase.color}} />
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div className="card p-4">
                  <h3 className="font-bold text-sm text-gray-900 mb-2">学習のコツ</h3>
                  {activeTrack === "basic" ? (
                    <div className="text-sm text-gray-600 space-y-2">
                      <p>1. ISO規格の「定義」を正確に覚える（特にISO 9241-11, 9241-210）</p>
                      <p>2. 各手法の「目的」と「使いどころ」をセットで理解する</p>
                      <p>3. ダークパターンやDE&I等の新しいテーマにも注目</p>
                      <p>4. 過去問や模擬問題で本番形式に慣れる</p>
                    </div>
                  ) : (
                    <div className="text-sm text-gray-600 space-y-2">
                      <p>1. コンピタンスマップを熟読し、各項目の意図を深く理解する</p>
                      <p>2. 1事例で6コンピタンス以上をカバーできるプロジェクトを選ぶ</p>
                      <p>3. 「なぜその手法を選んだか」の根拠を明確に書く</p>
                      <p>4. 合格者のレビュー会に参加し、フィードバックを受ける</p>
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>

          {/* Footer */}
          <footer className="mt-8 py-4 text-center text-xs text-gray-400 border-t">
            HCD資格 学習ロードマップ + UX実践ガイド — 試験の最新情報は各公式サイトで確認してください
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
